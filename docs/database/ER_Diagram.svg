<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="980" fill="#F6F2EA"/>
  <text x="90" y="80" fill="#1D1F1A" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Talent Hunt Offer Booking Platform</text>
  <text x="90" y="116" fill="#5D5A51" font-family="Segoe UI, Arial, sans-serif" font-size="18">Relational database diagram for hackathon presentation and project study material</text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#7A6C55" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#0F766E"/>
    </marker>
  </defs>

  <g filter="url(#shadow)">
    <rect x="90" y="180" width="320" height="250" rx="24" fill="#FFFDF8" stroke="#D7C7AE" stroke-width="2"/>
    <rect x="90" y="180" width="320" height="64" rx="24" fill="#0F766E"/>
    <text x="120" y="220" fill="#FFFDF8" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">users</text>
    <text x="120" y="280" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">PK  id</text>
    <text x="120" y="312" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">name</text>
    <text x="120" y="344" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">email</text>
    <text x="120" y="376" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">password_hash</text>
    <text x="120" y="408" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">role</text>
    <text x="120" y="440" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">FK  business_id</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="540" y="180" width="360" height="314" rx="24" fill="#FFFDF8" stroke="#D7C7AE" stroke-width="2"/>
    <rect x="540" y="180" width="360" height="64" rx="24" fill="#B45309"/>
    <text x="570" y="220" fill="#FFFDF8" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">businesses</text>
    <text x="570" y="280" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">PK  id</text>
    <text x="570" y="312" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">name</text>
    <text x="570" y="344" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">business_type</text>
    <text x="570" y="376" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">owner_name</text>
    <text x="570" y="408" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">phone / email / city</text>
    <text x="570" y="440" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">address / logo_url</text>
    <text x="570" y="472" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">opening_time / closing_time</text>
    <text x="570" y="504" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">FK  created_by_user_id</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1030" y="160" width="390" height="348" rx="24" fill="#FFFDF8" stroke="#D7C7AE" stroke-width="2"/>
    <rect x="1030" y="160" width="390" height="64" rx="24" fill="#15803D"/>
    <text x="1060" y="200" fill="#FFFDF8" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">offers</text>
    <text x="1060" y="260" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">PK  id</text>
    <text x="1060" y="292" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">FK  business_id</text>
    <text x="1060" y="324" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">title / description / category</text>
    <text x="1060" y="356" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">original_price / offer_price</text>
    <text x="1060" y="388" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">discount_percentage</text>
    <text x="1060" y="420" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">start_date / end_date</text>
    <text x="1060" y="452" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">start_time / end_time</text>
    <text x="1060" y="484" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">capacity / booking_limit / status</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="900" y="590" width="350" height="250" rx="24" fill="#FFFDF8" stroke="#D7C7AE" stroke-width="2"/>
    <rect x="900" y="590" width="350" height="64" rx="24" fill="#7C3AED"/>
    <text x="930" y="630" fill="#FFFDF8" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">offer_slots</text>
    <text x="930" y="690" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">PK  id</text>
    <text x="930" y="722" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">FK  offer_id</text>
    <text x="930" y="754" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">slot_date / start_time / end_time</text>
    <text x="930" y="786" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">capacity / booked_count</text>
    <text x="930" y="818" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">status / created_at</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1260" y="590" width="270" height="282" rx="24" fill="#FFFDF8" stroke="#D7C7AE" stroke-width="2"/>
    <rect x="1260" y="590" width="270" height="64" rx="24" fill="#DC2626"/>
    <text x="1290" y="630" fill="#FFFDF8" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">bookings</text>
    <text x="1290" y="690" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">PK  id</text>
    <text x="1290" y="722" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">booking_reference</text>
    <text x="1290" y="754" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">FK  offer_id</text>
    <text x="1290" y="786" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">FK  slot_id</text>
    <text x="1290" y="818" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">customer details</text>
    <text x="1290" y="850" fill="#1D1F1A" font-family="Consolas, monospace" font-size="18">people_count / status</text>
  </g>

  <path d="M410 305H520" stroke="#0F766E" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="436" y="292" fill="#0F766E" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">1 user can manage many businesses</text>

  <path d="M900 336H1010" stroke="#0F766E" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="908" y="322" fill="#0F766E" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">1 business publishes many offers</text>

  <path d="M1170 508V566" stroke="#0F766E" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="988" y="548" fill="#0F766E" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">1 offer opens many bookable slots</text>

  <path d="M1295 508V566H1395" stroke="#0F766E" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="1264" y="548" fill="#0F766E" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">1 offer receives many bookings</text>

  <path d="M1250 715H1260" stroke="#0F766E" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="1042" y="566" fill="#0F766E" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">1 slot can be referenced by many bookings</text>

  <rect x="90" y="880" width="1420" height="58" rx="18" fill="#FFF7E8" stroke="#E5D7BE" stroke-width="1.5"/>
  <text x="120" y="916" fill="#5D5A51" font-family="Segoe UI, Arial, sans-serif" font-size="18">Design note: bookings point to both offers and slots so reports can aggregate by campaign and by time window without expensive joins or historical ambiguity.</text>
</svg>
